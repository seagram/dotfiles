add_newline = false
format = """$directory$character"""
palette = "catppuccin_mocha"
right_format = """$all"""
command_timeout = 1000

[character]
disabled = true

[git_branch]
symbol = " "
format = '[$symbol$branch]($style) '
style = 'bold dimmed yellow'

[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold dimmed yellow'
conflicted = '🏳'
up_to_date = ''
untracked = '󱙃 '
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
stashed = ' '
modified = ' '
staged = '[++\($count\)](green)'
renamed = '襁 '
deleted = ' '

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = true
style = 'bold dimmed yellow'
symbol = " "

[bun]
format = '[$symbol($version )]($style)'
disabled = false
version_format = 'v${raw}'
style = 'bold dimmed yellow'

[docker_context]
format = '[$symbol$context is running...]($style) '
only_with_files = false
symbol = " "
style = "bold dimmed yellow"

[golang]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'bold dimmed yellow'

[hostname]
disabled = false
ssh_only = true
format = 'on [$hostname]($style)'
ssh_symbol = " "
style = "bold dimmed yellow"

[lua]
format = '[$symbol($version )]($style)'
symbol = " "
style = "bold dimmed yellow"
disabled = true

[package]
disabled = true

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
pyenv_version_name = false
style = 'bold dimmed yellow'

[terraform]
format = '[󱁢 $workspace]($style) '
style = "bold dimmed yellow"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[cmd_duration]
disabled = true

